<div class="login-container">
  <img src="/register-back.png" alt="Office Background" class="background-image" />
  <button class="back-button" (click)="goBack()">Back</button>
  <div class="login-box">
    <h2>Recruiter Login</h2>
    <form (ngSubmit)="login()" #loginForm="ngForm">
      <input
        type="email"
        placeholder="Enter Company Email"
        [(ngModel)]="recruiter.email"
        name="email"
        required
      />
      <input
        type="password"
        placeholder="Enter Password"
        [(ngModel)]="recruiter.password"
        name="password"
        required
      />
      <button type="submit">Login</button>
    </form>
    <button class="register-btn" (click)="goToRegister()">New Recruiter? Register</button>
  </div>
</div>
